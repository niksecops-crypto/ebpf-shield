name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Install eBPF build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev gcc-multilib iperf3 wrk
      - name: Generate BPF bindings
        run: make generate
      - name: Unit tests (config)
        run: go test -v -race ./pkg/config/...
      - name: Property tests (BPF in kernel)
        run: sudo go test -v ./pkg/bpf/...
      - name: E2E tests (with namespaces)
        run: sudo go test -v -count=1 ./pkg/e2e/...

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Install eBPF build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-libc-dev gcc-multilib
      - name: Generate BPF bindings
        run: make generate
      - name: Build binary
        run: make build
      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-shield
          path: ./ebpf-shield

  docker-and-release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write   # Required to upload release assets
      packages: write   # Required to publish containers to GHCR
      id-token: write   # Required for Cosign keyless OIDC signing
    steps:
      - uses: actions/checkout@v4

      # Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # Install Syft
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # Download built binary from build job
      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: ebpf-shield
          path: .

      - name: Make binary executable
        run: chmod +x ./ebpf-shield

      # Log in to GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # Build and push Docker image
      - uses: docker/build-push-action@v6
        id: build-image
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless signing of container images and SBOM generation using Syft/Cosign
      - name: Sign Container Images and Generate SBOM
        run: |
          # Parse image tags from metadata action output
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            echo "Signing tag: $tag"
            cosign sign --yes "$tag"
            
            # Generate CycloneDX JSON SBOM
            syft "$tag" -o cyclonedx-json=image-sbom.json
            
            # Attest the SBOM to the image
            cosign attest --yes --predicate image-sbom.json --type cyclonedx "$tag"
          done

      # Binary SBOM generation and signing
      - name: Generate and Sign Binary Release Artifacts
        run: |
          # Generate SPDX JSON SBOM for the binary
          syft ./ebpf-shield -o spdx-json=binary-sbom.spdx.json
          
          # Sign binary
          cosign sign-blob --yes --output-signature ebpf-shield.sig --output-certificate ebpf-shield.pem ./ebpf-shield
          
          # Sign SBOM
          cosign sign-blob --yes --output-signature binary-sbom.spdx.json.sig --output-certificate binary-sbom.spdx.json.pem ./binary-sbom.spdx.json

      # Publish to GitHub Releases if tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./ebpf-shield
            ./ebpf-shield.sig
            ./ebpf-shield.pem
            ./binary-sbom.spdx.json
            ./binary-sbom.spdx.json.sig
            ./binary-sbom.spdx.json.pem
