name: Ebpf-Shield CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install eBPF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang llvm linux-libc-dev libbpf-dev

    - name: Generate BPF objects
      run: make generate

    - name: Build binary
      run: make build

    - name: Run unit tests
      run: go test -v ./...
